name: Pikafish

on:
  push:
    branches:
      - master

jobs:
  Pikafish-x86-64:
    name: ${{ matrix.config.name }}-x86-64-universal
    runs-on: ${{ matrix.config.os }}
    env:
      ARCH: x86-64-universal
      COMP: clang
      EXE: Pikafish-${{ matrix.config.name }}-x86-64-universal${{ matrix.config.ext }}
    strategy:
      matrix:
        config:
          - name: Linux
            os: ubuntu-22.04 
            shell: bash
          - name: Windows
            os: windows-latest
            shell: msys2 {0}
            ext: .exe
    defaults:
      run:
        working-directory: src
        shell: ${{ matrix.config.shell }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup msys and install required packages
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: clang64
          install: mingw-w64-clang-x86_64-clang make git

      - name: Set up LLVM
        if: runner.os == 'Linux'
        run: |
          LLVM_VERSION=22
          curl -s https://apt.llvm.org/llvm.sh | sudo bash -s -- $LLVM_VERSION
          sudo apt install -y libc++-$LLVM_VERSION-dev libc++abi-$LLVM_VERSION-dev libunwind-$LLVM_VERSION-dev
          echo "EXTRACXXFLAGS=-stdlib=libc++" >> $GITHUB_ENV
          echo "EXTRALDFLAGS=-stdlib=libc++" >> $GITHUB_ENV
          echo "/usr/lib/llvm-$LLVM_VERSION/bin" >> $GITHUB_PATH

      - name: Compile universal build
        run: |
          make -j build EXE=$EXE
          make strip EXE=$EXE
          cp $EXE ../

      # Artifacts automatically get zipped.
      # To avoid double-zipping, we use the unzipped directory
      - uses: actions/upload-artifact@v7
        with:	
          name: ${{ env.EXE }}
          path: ${{ env.EXE }}

  Pikafish-MacOS:
    name: MacOS-apple-silicon
    runs-on: macos-latest
    env:
      ARCH: apple-silicon
      COMP: clang
      EXE: Pikafish-MacOS-apple-silicon
    defaults:
      run:
        working-directory: src
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Compile apple-silicon build
        run: |
          make -j build EXE=$EXE
          make strip EXE=$EXE
          cp $EXE ../

      # Artifacts automatically get zipped.
      # To avoid double-zipping, we use the unzipped directory
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.EXE }}
          path: ${{ env.EXE }}

  Pikafish-Android:
    name: Android-armv8-universal
    runs-on: ubuntu-latest
    env:
      ARCH: armv8-universal
      COMP: ndk
      EXE: Pikafish-Android-armv8-universal
      LDFLAGS: "-static -Wno-unused-command-line-argument"
    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v6

      - name: Install NDK
        run: |
          NDKV="27.2.12479018"
          ANDROID_ROOT=/usr/local/lib/android
          ANDROID_SDK_ROOT=$ANDROID_ROOT/sdk
          SDKMANAGER=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager
          echo "y" | $SDKMANAGER "ndk;$NDKV"
          ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/$NDKV
          ANDROID_NDK_BIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin
          echo "ANDROID_NDK_BIN=$ANDROID_NDK_BIN" >> $GITHUB_ENV

      - name: Compile universal build
        run: |
          export PATH=${{ env.ANDROID_NDK_BIN }}:$PATH
          make -j build EXE=$EXE
          make strip EXE=$EXE
          cp $EXE ../

      # Artifacts automatically get zipped.
      # To avoid double-zipping, we use the unzipped directory
      - uses: actions/upload-artifact@v7
        with:	
          name: ${{ env.EXE }}
          path: ${{ env.EXE }}

  Pikafish:
    name: Pikafish
    runs-on: ubuntu-latest
    needs: [Pikafish-x86-64, Pikafish-MacOS, Pikafish-Android]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          pattern: Pikafish-*
          path: Artifacts

      - name: Put binaries into release root
        run: cp Artifacts/Pikafish-*/* .

      - name: Download wiki
        run: |
          git clone https://github.com/official-pikafish/Pikafish.wiki.git Wiki
          cd Wiki
          rm -rf .git

      # Artifacts automatically get zipped.
      # To avoid double-zipping, we use the unzipped directory
      - uses: actions/upload-artifact@v7
        with:
          name: Pikafish
          path: |
            Pikafish-*
            Wiki
            AUTHORS
            CONTRIBUTING.md
            Copying.txt
            README.md
            Top CPU Contributors.txt
